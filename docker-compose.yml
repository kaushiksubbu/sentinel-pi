version: "3.8"

services:

  land-bronze:
    build:
      context: .
      dockerfile: docker/land-bronze.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/app/src
      - /mnt/data/sentinel-pi/data:/app/data
      - /mnt/data/sentinel-pi/logs:/app/logs
    environment:
      - PYTHONPATH=/app
    networks:
      - sentinel-net

  transform-silver:
    build:
      context: .
      dockerfile: docker/transform-silver.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/app/src
      - /mnt/data/sentinel-pi/data:/app/data
      - /mnt/data/sentinel-pi/logs:/app/logs
    environment:
      - PYTHONPATH=/app
    depends_on:
      - land-bronze
    networks:
      - sentinel-net

  transform-gold:
    build:
      context: .
      dockerfile: docker/transform-gold.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/app/src
      - /mnt/data/sentinel-pi/data:/app/data
      - /mnt/data/sentinel-pi/logs:/app/logs
    environment:
      - PYTHONPATH=/app
    depends_on:
      - transform-silver
    networks:
      - sentinel-net

  transform-gold:
    build:
      context: .
      dockerfile: docker/transform-gold.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/app/src
      - /mnt/data/sentinel-pi/data:/app/data
      - /mnt/data/sentinel-pi/logs:/app/logs
    environment:
      - PYTHONPATH=/app
    depends_on:
      - transform-silver
    networks:
      - sentinel-net

  ai-summary:
    build:
      context: .
      dockerfile: docker/ai-summary.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/app/src
      - /mnt/data/sentinel-pi/data:/app/data
      - /mnt/data/sentinel-pi/logs:/app/logs
      - /mnt/data/sentinel-pi/docs:/app/docs
    environment:
      - PYTHONPATH=/app
    depends_on:
      - transform-gold
    networks:
      - sentinel-net

networks:
  sentinel-net:
    driver: bridge
