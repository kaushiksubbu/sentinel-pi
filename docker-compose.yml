version: "3.8"

services:

  land-bronze:
    build:
      context: .
      dockerfile: docker/land-bronze.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/mnt/data/sentinel-pi/src
      - /mnt/data/sentinel-pi/data:/mnt/data/sentinel-pi/data
      - /mnt/data/sentinel-pi/logs:/mnt/data/sentinel-pi/logs
    environment:
      - PYTHONPATH=/mnt/data/sentinel-pi
    networks:
      - sentinel-net

  transform-silver:
    build:
      context: .
      dockerfile: docker/transform-silver.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/mnt/data/sentinel-pi/src
      - /mnt/data/sentinel-pi/data:/mnt/data/sentinel-pi/data
      - /mnt/data/sentinel-pi/logs:/mnt/data/sentinel-pi/logs
    environment:
      - PYTHONPATH=/mnt/data/sentinel-pi
    depends_on:
      - land-bronze
    networks:
      - sentinel-net

  transform-gold:
    build:
      context: .
      dockerfile: docker/transform-gold.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/mnt/data/sentinel-pi/src
      - /mnt/data/sentinel-pi/data:/mnt/data/sentinel-pi/data
      - /mnt/data/sentinel-pi/logs:/mnt/data/sentinel-pi/logs
    environment:
      - PYTHONPATH=/mnt/data/sentinel-pi
    depends_on:
      - transform-silver
    networks:
      - sentinel-net

  transform-gold:
    build:
      context: .
      dockerfile: docker/transform-gold.Dockerfile
    volumes:
      - /mnt/data/sentinel-pi/src:/mnt/data/sentinel-pi/src
      - /mnt/data/sentinel-pi/data:/mnt/data/sentinel-pi/data
      - /mnt/data/sentinel-pi/logs:/mnt/data/sentinel-pi/logs
